<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI News Pulse</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell compact-shell">
      <header class="reader-topbar reveal">
        <nav class="tab-strip" id="tab-strip" aria-label="栏目切换">
          <button type="button" class="tab-button is-active" data-tab="daily">每日 AI 新闻</button>
          <button type="button" class="tab-button" data-tab="weekly">每周 AI 新闻</button>
          <button type="button" class="tab-button" data-tab="aiTech">AI 技术周报</button>
          <button type="button" class="tab-button" data-tab="portfolio">投资组合汇总</button>
        </nav>

        <div class="reader-tools" aria-label="阅读设置">
          <div class="font-size-switch" id="font-size-switch" role="group" aria-label="字体大小">
            <button type="button" class="font-size-button" data-size="compact" aria-pressed="false">
              A-
            </button>
            <button
              type="button"
              class="font-size-button is-active"
              data-size="default"
              aria-pressed="true"
            >
              A
            </button>
            <button
              type="button"
              class="font-size-button"
              data-size="comfortable"
              aria-pressed="false"
            >
              A+
            </button>
          </div>
        </div>
      </header>

      <main class="reader-layout reveal">
        <aside class="timeline-rail" aria-label="文章时间线">
          <div class="timeline-track" id="date-strip"></div>
        </aside>

        <article class="reader-document">
          <header class="reader-head">
            <h1 id="article-title">加载中...</h1>
            <p id="article-summary" class="doc-summary"></p>
          </header>
          <div id="report-content" class="report-content"></div>
        </article>
      </main>
    </div>
    <p id="last-updated" class="site-updated-stamp" aria-live="polite"></p>

    <script src="./app.js"></script>
  </body>
</html>
