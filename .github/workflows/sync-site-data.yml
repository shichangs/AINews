name: Sync Site Data

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - "scripts/sync-content.js"
      - "scripts/lib/source-state.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate site data
        run: node scripts/sync-content.js

      - name: Commit data updates
        run: |
          if git diff --quiet -- data/site-data.json; then
            echo "No generated data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-data.json
          git commit -m "chore: update generated AI news data"
          git push origin main
